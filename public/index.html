<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Uptime Monitor - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen font-sans text-gray-900">
    <div class="max-w-4xl mx-auto p-4 sm:p-6">
      <header class="flex justify-between items-center mb-6 border-b pb-4">
        <h1 class="text-2xl font-bold tracking-tight">Uptime Monitor Dashboard</h1>
        <button id="btn-summary" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg shadow-sm transition duration-150">
          Recent Summary
        </button>
      </header>

      <main id="dashboard-view">
        <div id="list" class="space-y-3"></div>
      </main>

      <main id="summary-view" class="hidden space-y-6">
        <div class="flex items-center justify-between">
          <h2 class="text-xl font-bold">Metrics Summary</h2>
          <button id="btn-back" class="text-blue-600 hover:text-blue-800 font-medium flex items-center gap-1">
            &larr; Back to Dashboard
          </button>
        </div>
        
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
          <canvas id="latencyChart" height="150"></canvas>
        </div>

        <div class="space-y-2">
          <h3 class="text-sm font-semibold uppercase tracking-wider text-gray-400">Raw JSON Info</h3>
          <pre id="summary" class="bg-gray-900 text-gray-100 p-4 rounded-xl shadow-inner overflow-x-auto text-xs leading-relaxed"></pre>
        </div>
      </main>
    </div>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
  </body>
</html>
